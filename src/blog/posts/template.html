<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ Title }}</title>
    <link rel="icon" href="../../../icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./template.css">
    <meta name="robots" content="index, follow">
</head>
<body>
    <mdui-top-app-bar scroll-behavior="elevate shrink" variant="large">
        <mdui-button-icon href="../../">
            <mdui-icon-arrow-back></mdui-icon-arrow-back>
        </mdui-button-icon>
        <mdui-button-icon href="../../../">
            <mdui-icon-home></mdui-icon-home>
        </mdui-button-icon>
        <mdui-top-app-bar-title>{{ Title }}</mdui-top-app-bar-title>
        <div style="flex-grow: 1"></div>
        <mdui-tooltip content="" placement="left">
            <mdui-button-icon class="open-content-drawer">
                <mdui-icon-menu-open></mdui-icon-menu-open>
            </mdui-button-icon>
        </mdui-tooltip>
    </mdui-top-app-bar>
    <main>
        <div class="cate-tag">
            <mdui-tooltip placement="top">
                <mdui-chip variant="input">
                    <mdui-icon-description--outlined slot="icon"></mdui-icon-description--outlined>
                    <span></span>
                </mdui-chip>
                <div slot="content">
                    <span></span><span></span><br />
                    <span></span><span></span><br />
                    <span></span><span></span>
                </div>
            </mdui-tooltip>
        </div>
        <article class="mdui-prose article" id="article-content">
            {{ content }}
        </article>

        <div class="auto-box postnav">
            <mdui-tooltip class="newer-post" content=""> 
                <mdui-card disabled class="v-box" variant="outlined" clickable>
                    <span class="h-box"><mdui-icon-arrow-back></mdui-icon-arrow-back><span><!----></span></span>
                    <span class="other-post-title"><!----></span>
                </mdui-card>
            </mdui-tooltip>
            <div class="h-box postnav-part2">
                <mdui-tooltip content="" class="older-post">
                    <mdui-card disabled class="v-box" variant="outlined" clickable>
                        <span class="h-box"><span><!----></span><mdui-icon-arrow-forward></mdui-icon-arrow-forward></span>
                        <span class="other-post-title"><!----></span>
                    </mdui-card>
                </mdui-tooltip>
                <mdui-tooltip content="">
                    <mdui-card class="v-box rand-post" variant="outlined" clickable style="cursor: none !important;" disabled>
                        <mdui-icon-shuffle></mdui-icon-shuffle>
                    </mdui-card>
                </mdui-tooltip>
            </div>
        </div>

        <div class="giscus"></div>
    </main>
    <aside>
        <mdui-navigation-drawer modal close-on-esc close-on-overlay-click placement="right">
            <mdui-list class="toc-list"></mdui-list>
        </mdui-navigation-drawer>
    </aside>
    <script src="./template.ts" type="module"></script>
    {{ toc_json }}
    {{ cate_tag_json }}
    {{ postnav_json }}
</body>
</html>
